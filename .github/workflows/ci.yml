name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package (editable) and deps
      working-directory: projects/code
      run: |
        python -m venv .venv
        . .venv/bin/activate
        python -m pip install --upgrade pip setuptools wheel
        pip install -e todo-cli
        if [ -f todo-cli/env/requirements.txt ]; then pip install -r todo-cli/env/requirements.txt; fi

    - name: Run tests
      working-directory: projects/code
      run: |
        . .venv/bin/activate
        pytest -q .
